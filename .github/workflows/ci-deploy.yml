name: CI & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Deploy only on releasable commits (feat/fix/perf/BREAKING) or a manual run.
    # Config-only commits (ci/chore/docs) and dependabot bumps don't redeploy.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (startsWith(github.event.head_commit.message, 'feat') ||
        startsWith(github.event.head_commit.message, 'fix') ||
        startsWith(github.event.head_commit.message, 'perf') ||
        contains(github.event.head_commit.message, 'BREAKING CHANGE')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (fetches zx-kit from npm)
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Verify dist/index.html exists
        run: test -f dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
