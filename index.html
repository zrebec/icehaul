<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ice Haul</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      canvas#game {
        /* Fit viewport, never exceed native 4× (1024×768), preserve 4:3 ratio. */
        width: min(1024px, 100vw, calc(100dvh * 4 / 3));
        height: auto;
        aspect-ratio: 4 / 3;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
        outline: 4px solid #CDCDCD;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
